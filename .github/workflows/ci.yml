name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      # -PskipPublishChain bypasses the cache-proxy publish-* tasks: those
      # require DATABASE_URL / Postgres / the cache-proxy machine, none of
      # which exist on the CI runner. The bundled salem_content.db checked
      # into the repo is canonical for CI verification — the publish chain
      # is the operator-machine refresh path, not the build path.
      - name: Build debug
        run: ./gradlew :app-salem:assembleDebug -PskipPublishChain --no-daemon --stacktrace

      - name: Lint release
        run: ./gradlew :app-salem:lintRelease -PskipPublishChain --no-daemon --stacktrace

      - name: routing-jvm tests
        run: ./gradlew :routing-jvm:test --no-daemon --stacktrace
